# nginx configuration for Discord bot webhook endpoint
# Add this to /etc/nginx/sites-available/api.theoatrix.app

# Location block to add inside existing server block:
location /github-webhook {
    # Proxy to Discord bot webhook server
    proxy_pass http://localhost:5000/;

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # GitHub webhook-specific headers (preserve for bot)
    proxy_set_header X-GitHub-Event $http_x_github_event;
    proxy_set_header X-GitHub-Delivery $http_x_github_delivery;
    proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;

    # Increase timeout for webhook processing
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;

    # Disable buffering for real-time delivery
    proxy_buffering off;

    # Only allow POST requests (GitHub webhooks)
    limit_except POST {
        deny all;
    }
}

# Instructions:
# 1. Add the location block above to /etc/nginx/sites-available/api.theoatrix.app
#    inside the existing server block for api.theoatrix.app
# 2. Test nginx config: sudo nginx -t
# 3. Reload nginx: sudo systemctl reload nginx
# 4. Verify webhook endpoint: curl -X POST https://api.theoatrix.app/github-webhook
#    (Should return 404 or error, but confirms nginx routing works)
