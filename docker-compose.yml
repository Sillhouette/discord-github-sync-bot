services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    image: discord-github-sync-bot
    container_name: discord-github-sync-bot
    restart: unless-stopped
    user: botuser
    env_file: .env
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-5000}/health"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

volumes:
  bot-data:
